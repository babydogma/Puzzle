<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PuzzleMaster</title>

<link rel="manifest" href="manifest.json">

<style>
body{
    font-family:sans-serif;
    margin:0;
    padding:16px;
    background:#111;
    color:#fff;
    text-align:center;
}

h2{
    margin-top:10px;
}

button,
select{
    padding:10px;
    margin:5px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

button{
    cursor:pointer;
}

#board{
    display:grid;
    gap:2px;
    margin:20px auto;
    touch-action:none;
}

.tile{
    background-size:100% 100%;
    border:1px solid #333;
    display:flex;
    align-items:center;
    justify-content:center;
    user-select:none;
}
</style>
</head>

<body>

<h2>PuzzleMaster</h2>

<select id="size">
    <option value="3">3x3</option>
    <option value="4">4x4</option>
    <option value="5">5x5</option>
</select>

<button onclick="newGame()">
    Новый пазл
</button>

<div id="board"></div>

<script src="app.js"></script>

</body>
</html>
